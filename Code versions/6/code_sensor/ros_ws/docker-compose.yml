services:
  robot_brain:
    build: .
    container_name: ros_slam
    network_mode: host
    privileged: true
    volumes:
      - ./src:/ros2_ws/src
    environment:
      - ROS_DOMAIN_ID=30
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0" # RPLidar
      - "/dev/ttyACM0:/dev/ttyACM0" # Arduino Mega
    stdin_open: true
    tty: true
    restart: always
